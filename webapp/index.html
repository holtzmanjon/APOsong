<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Delay Logger</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0a0a0f;
      --surface: #12121a;
      --border:  #1e1e2e;
      --text:    #e8e8f0;
      --muted:   #5a5a7a;
      --c1:      #e8ff47;   /* 1h - yellow-green */
      --c2:      #47c8ff;   /* 2h - cyan */
      --c3:      #ff7847;   /* 3h - orange */
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem;
      background-image:
        radial-gradient(ellipse 60% 40% at 50% -5%, rgba(71,200,255,0.07) 0%, transparent 60%),
        repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,0.015) 39px, rgba(255,255,255,0.015) 40px),
        repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,0.015) 39px, rgba(255,255,255,0.015) 40px);
    }

    .container {
      width: 100%;
      max-width: 520px;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    header h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1;
      color: var(--text);
    }
    header h1 span { color: var(--c2); }
    header p {
      margin-top: 0.35rem;
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* ── Button grid ── */
    .btn-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
    }

    .delay-btn {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1.75rem 0.5rem 1.5rem;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      transition: background 0.15s, border-color 0.15s, box-shadow 0.15s, transform 0.1s;
      outline: none;
      color: var(--text);
      font-family: 'Syne', sans-serif;
    }

    .delay-btn .hours {
      font-size: 2.8rem;
      font-weight: 800;
      line-height: 1;
      transition: color 0.15s;
    }
    .delay-btn .label {
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
    }

    .delay-btn[data-h="1"] .hours { color: var(--c1); }
    .delay-btn[data-h="2"] .hours { color: var(--c2); }
    .delay-btn[data-h="3"] .hours { color: var(--c3); }

    .delay-btn[data-h="1"]:hover { border-color: var(--c1); box-shadow: 0 0 24px rgba(232,255,71,0.15); background: rgba(232,255,71,0.04); }
    .delay-btn[data-h="2"]:hover { border-color: var(--c2); box-shadow: 0 0 24px rgba(71,200,255,0.15); background: rgba(71,200,255,0.04); }
    .delay-btn[data-h="3"]:hover { border-color: var(--c3); box-shadow: 0 0 24px rgba(255,120,71,0.15); background: rgba(255,120,71,0.04); }

    .delay-btn:active, .delay-btn.firing {
      transform: scale(0.96);
    }
    .delay-btn[data-h="1"].firing { background: rgba(232,255,71,0.1); border-color: var(--c1); }
    .delay-btn[data-h="2"].firing { background: rgba(71,200,255,0.1); border-color: var(--c2); }
    .delay-btn[data-h="3"].firing { background: rgba(255,120,71,0.1); border-color: var(--c3); }

    .delay-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* ── Result panel ── */
    .result-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1.25rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .result-label {
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    #result-ts {
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text);
      min-height: 1.4em;
      transition: color 0.3s;
    }
    #result-ts.c1 { color: var(--c1); }
    #result-ts.c2 { color: var(--c2); }
    #result-ts.c3 { color: var(--c3); }
    #result-ts.err { color: #ff4747; }

    #status {
      font-size: 0.68rem;
      color: var(--muted);
      min-height: 1em;
    }
  </style>
</head>
<body>
<div class="container">
  <header>
    <h1>DELAY <span>LOGGER</span></h1>
    <p>Writes current time + offset to row #1 in Postgres</p>
  </header>

  <div class="btn-grid">
    <button class="delay-btn" data-h="1" onclick="pressButton(1)">
      <span class="hours">+1</span>
      <span class="label">hour</span>
    </button>
    <button class="delay-btn" data-h="2" onclick="pressButton(2)">
      <span class="hours">+2</span>
      <span class="label">hours</span>
    </button>
    <button class="delay-btn" data-h="3" onclick="pressButton(3)">
      <span class="hours">+3</span>
      <span class="label">hours</span>
    </button>
  </div>

  <div class="result-panel">
    <div class="result-label">Stored timestamp</div>
    <div id="result-ts">—</div>
    <div id="status">loading current value…</div>
  </div>
</div>

<script>
  const colorClass = { 1: 'c1', 2: 'c2', 3: 'c3' };

  async function pressButton(hours) {
    const btn    = document.querySelector(`.delay-btn[data-h="${hours}"]`);
    const tsEl   = document.getElementById('result-ts');
    const statEl = document.getElementById('status');

    document.querySelectorAll('.delay-btn').forEach(b => b.disabled = true);
    btn.classList.add('firing');
    statEl.textContent = `writing +${hours}h…`;

    try {
      const res  = await fetch(`/press/${hours}`, { method: 'POST' });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();

      tsEl.className = colorClass[hours];
      tsEl.textContent = formatTs(data.pressed_at);
      statEl.textContent = `✓ row #1 updated with +${hours}h offset`;
    } catch (e) {
      tsEl.className = 'err';
      tsEl.textContent = `Error: ${e.message}`;
      statEl.textContent = '';
    } finally {
      btn.classList.remove('firing');
      document.querySelectorAll('.delay-btn').forEach(b => b.disabled = false);
    }
  }

  function formatTs(iso) {
    return new Date(iso).toLocaleString(undefined, {
      year: 'numeric', month: 'short', day: '2-digit',
      hour: '2-digit', minute: '2-digit', second: '2-digit',
      hour12: false, timeZoneName: 'short'
    });
  }

  // Load the current stored value on page load
  async function loadCurrent() {
    const statEl = document.getElementById('status');
    const tsEl   = document.getElementById('result-ts');
    try {
      const res  = await fetch('/current');
      const data = await res.json();
      if (data.pressed_at) {
        tsEl.textContent = formatTs(data.pressed_at);
        statEl.textContent = 'current value loaded from db';
      } else {
        statEl.textContent = 'no value in db yet — press a button';
      }
    } catch (_) {
      statEl.textContent = 'could not load current value';
    }
  }

  loadCurrent();
</script>
</body>
</html>
